<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f9f9f9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .nav-link { transition: all 0.2s ease; cursor: pointer; }
        .nav-link:hover { background: #fff7ed; color: #ea580c; }
        .nav-link.active { background: #fff7ed; color: #ea580c; font-weight: 600; border-right: 3px solid #ea580c; }
        .nav-link.active i { color: #ea580c; }
        .bg-orange-gradient { background: linear-gradient(135deg, #EA580C 0%, #C2410C 100%); }
        .stat-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -4px rgba(234,88,12,0.12); }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Sidebar -->
        <!-- Notification toast -->
    <div id="notifToast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[400] flex flex-col gap-2 w-full max-w-sm px-4 pointer-events-none" style="top:1.25rem"></div>

    <aside class="w-60 bg-white border-r border-gray-100 flex flex-col fixed h-full z-50 shrink-0">
        <div class="px-6 py-6">
            <h1 class="text-lg font-black text-gray-900 tracking-tight">Campus<span class="text-orange-600">Connect</span></h1>
        </div>

        <nav class="flex-1 px-3 space-y-0.5 overflow-y-auto no-scrollbar">
            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest px-3 pt-1 pb-2">Main</p>

            <button onclick="UI.showView('home')" id="btn-home"
                class="w-full flex items-center gap-3 px-3 py-2.5 text-gray-500 rounded-xl nav-link text-sm active">
                <i class="ri-dashboard-line text-base w-5 text-center"></i> Dashboard
            </button>

            <button onclick="UI.showView('groups')" id="btn-groups"
                class="w-full flex items-center gap-3 px-3 py-2.5 text-gray-500 rounded-xl nav-link text-sm">
                <i class="ri-group-2-line text-base w-5 text-center"></i> My Groups
            </button>

            <button onclick="UI.showView('messages')" id="btn-messages"
                class="w-full flex items-center gap-3 px-3 py-2.5 text-gray-500 rounded-xl nav-link text-sm">
                <i class="ri-message-3-line text-base w-5 text-center"></i> Messages
            </button>

            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest px-3 pt-5 pb-2">Academic</p>

            <button onclick="Resources.init(window.userRole, Auth.userData ? Auth.userData.user_id : null)" id="btn-resources"
                class="w-full flex items-center gap-3 px-3 py-2.5 text-gray-500 rounded-xl nav-link text-sm">
                <i class="ri-book-read-line text-base w-5 text-center"></i> Resource Hub
            </button>

            <button onclick="UI.showView('events')" id="btn-events"
                class="w-full flex items-center gap-3 px-3 py-2.5 text-gray-500 rounded-xl nav-link text-sm">
                <i class="ri-calendar-event-line text-base w-5 text-center"></i> Campus Events
            </button>

            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest px-3 pt-5 pb-2">Account</p>

            <button onclick="window.location.href='profile.html'"
                class="w-full flex items-center gap-3 px-3 py-2.5 text-gray-500 rounded-xl nav-link text-sm">
                <i class="ri-user-settings-line text-base w-5 text-center"></i> My Profile
            </button>
        </nav>

        <div class="p-4 border-t border-gray-100">
            <button onclick="Auth.logout()"
                class="w-full flex items-center gap-3 px-3 py-2.5 text-red-400 hover:bg-red-50 rounded-xl transition text-sm font-semibold">
                <i class="ri-logout-box-r-line text-base"></i> Sign Out
            </button>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 ml-60 min-h-screen flex flex-col">

        <!-- Top bar -->
        <div class="px-8 py-4 flex justify-end items-center sticky top-0 bg-white/90 backdrop-blur-md z-40 border-b border-gray-100">
            <div onclick="window.location.href='profile.html'"
                 class="flex items-center gap-3 cursor-pointer group px-3 py-1.5 rounded-xl hover:bg-gray-50 transition">
                <div class="text-right hidden md:block">
                    <p id="navUserName" class="text-sm font-bold text-gray-900 leading-tight">Student</p>
                    <p class="text-[10px] text-orange-600 font-semibold">Active</p>
                </div>
                <img id="navUserAvatar" src="https://ui-avatars.com/api/?name=User&background=EA580C&color=fff"
                     class="w-9 h-9 rounded-xl border-2 border-white shadow-sm group-hover:border-orange-200 transition">
            </div>
        </div>

        <!-- Home view -->
        <div id="homeView" class="p-8">
            <header class="flex justify-between items-start mb-10">
                <div>
                    <h2 class="text-4xl font-black text-gray-900 tracking-tight leading-none">
                        Hello, <span id="welcomeName" class="text-orange-600">there</span>! 👋
                    </h2>
                    <p class="text-gray-400 font-medium mt-2 text-sm" id="userUni">Loading...</p>
                </div>
                <span id="navUserRole" class="text-xs font-bold text-white bg-gray-900 px-4 py-2 rounded-full uppercase tracking-widest shadow">Student</span>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
                <div class="stat-card bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-orange-50 text-orange-600 rounded-xl flex items-center justify-center text-xl">
                            <i class="ri-message-3-line"></i>
                        </div>
                        <div>
                            <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Messages</p>
                            <p class="text-3xl font-black text-gray-900">0</p>
                        </div>
                    </div>
                </div>

                <div class="stat-card bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-orange-50 text-orange-600 rounded-xl flex items-center justify-center text-xl">
                            <i class="ri-calendar-todo-line"></i>
                        </div>
                        <div>
                            <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Next Event</p>
                            <p id="eventWidget" class="text-base font-bold text-gray-900 leading-tight mt-0.5 truncate max-w-[140px]">None</p>
                        </div>
                    </div>
                </div>

                <div class="stat-card bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-gray-900 text-white rounded-xl flex items-center justify-center text-xl">
                            <i class="ri-shield-check-line"></i>
                        </div>
                        <div>
                            <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Security</p>
                            <p class="text-3xl font-black text-gray-900">Active</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-gradient-to-br from-gray-900 via-orange-950 to-gray-900 rounded-3xl p-12 text-white relative overflow-hidden shadow-xl">
                <div class="relative z-10 max-w-lg">
                    <h2 class="text-3xl font-black mb-4 leading-tight tracking-tight">Your academic hub is ready.</h2>
                    <p class="text-orange-200 text-sm mb-8 leading-relaxed">Collaborate in groups, access faculty resources, and stay updated with campus events.</p>
                    <button onclick="Resources.init(window.userRole, Auth.userData ? Auth.userData.user_id : null)"
                        class="bg-orange-600 hover:bg-orange-500 text-white px-8 py-4 rounded-xl font-bold text-sm uppercase tracking-widest transition hover:scale-105 active:scale-95 shadow-lg shadow-orange-900/50">
                        Explore Hub
                    </button>
                </div>
                <div class="absolute -right-16 -bottom-16 w-72 h-72 bg-orange-600/10 rounded-full blur-3xl pointer-events-none"></div>
            </div>
        </div>

        <!-- Dynamic workspace -->
        <div id="activeWorkspace" class="hidden min-h-screen"></div>
    </main>

    <!-- Modal -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
        <div id="modalContent" class="bg-white w-full max-w-lg rounded-2xl shadow-2xl relative">
            <button onclick="UI.closeModal()" class="absolute top-4 right-5 text-gray-300 hover:text-gray-700 text-3xl leading-none transition z-10">&times;</button>
            <div id="modalBody" class="max-h-[88vh] overflow-y-auto no-scrollbar"></div>
        </div>
    </div>

    <script src="assets/js/auth.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/groups.js"></script>
    <script src="assets/js/social.js"></script>
    <script src="assets/js/resources.js"></script>
    <script src="assets/js/events.js"></script>

    <script>

        function showNotification(message, type = "info") {
            const container = document.getElementById("notifToast");
            if (!container) { alert(message); return; }
            const colors = {
                success: "bg-green-600",
                error:   "bg-red-600",
                info:    "bg-gray-900",
                warning: "bg-amber-500",
            };
            const icons = { success: "ri-checkbox-circle-line", error: "ri-error-warning-line", info: "ri-information-line", warning: "ri-alert-line" };
            const el = document.createElement("div");
            el.className = `pointer-events-auto flex items-center gap-3 ${colors[type] || colors.info} text-white px-5 py-3 rounded-xl shadow-2xl text-sm font-semibold animate-in slide-in-from-top duration-300`;
            el.innerHTML = `<i class="${icons[type] || icons.info} text-base shrink-0"></i><span>${message}</span>`;
            container.appendChild(el);
            setTimeout(() => { el.style.opacity = "0"; el.style.transition = "opacity 0.3s"; setTimeout(() => el.remove(), 300); }, 3500);
        }
        window.showNotification = showNotification;


        async function loadDashboardStats() {
            try {
                const [gRes, iRes, fRes] = await Promise.all([
                    fetch('api/collaboration/get_my_groups.php').then(r => r.json()),
                    fetch('api/events/get_my_interests.php').then(r => r.json()),
                    fetch('api/social/get_friends.php').then(r => r.json()),
                ]);
                const gCount = document.getElementById('groupCounter');
                const iCount = document.getElementById('interestCounter');
                const fCount = document.getElementById('friendCounter');
                if (gRes.success && gCount) gCount.textContent = gRes.data.length;
                if (iRes.success && iCount) {
                    iCount.textContent = iRes.data.length;
                    renderInterestedEvents(iRes.data);
                }
                if (fRes.success && fCount) fCount.textContent = fRes.data.length;
            } catch(e) { console.error(e); }
        }

        function renderInterestedEvents(events) {
            const list = document.getElementById('interestedEventsList');
            if (!list) return;
            if (!events || events.length === 0) {
                list.innerHTML = `<p class="text-xs text-gray-400">You haven't marked any events as interested yet.</p>`;
                return;
            }
            list.innerHTML = events.slice(0,3).map(e => {
                const d = new Date(e.event_date);
                return `
                  <div class="flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100">
                    <div class="flex items-center gap-3">
                      <div class="w-10 h-10 bg-orange-50 rounded-xl flex flex-col items-center justify-center shrink-0">
                        <span class="text-sm font-black text-orange-600 leading-none">${d.getDate()}</span>
                        <span class="text-[8px] font-bold text-orange-400 uppercase">${d.toLocaleString('default',{month:'short'})}</span>
                      </div>
                      <div>
                        <p class="text-sm font-semibold text-gray-800">${e.title}</p>
                        <p class="text-[10px] text-gray-400">${e.location} · ${e.category}</p>
                      </div>
                    </div>
                    <span class="text-[10px] bg-orange-50 text-orange-500 px-2 py-0.5 rounded-full font-semibold">${e.interest_count || 0} interested</span>
                  </div>`;
            }).join('');
            if (events.length > 3) {
                list.innerHTML += `<p class="text-xs text-gray-400 text-center pt-2">+${events.length - 3} more · <button onclick="UI.showView('events')" class="text-orange-600 font-semibold hover:underline">View all</button></p>`;
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await Auth.checkSession();
            if (!user) {
                showNotification('Please log in first.', 'info');
                setTimeout(() => { window.location.href = 'login.html'; }, 1200);
                return;
            }

            // uni_admin goes straight to admin panel
            if (user.role === 'uni_admin') {
                window.location.href = 'admin.html';
                return;
            }

            const firstName = user.full_name.split(' ')[0];
            document.getElementById('welcomeName').textContent = firstName;
            document.getElementById('navUserName').textContent = user.full_name;
            document.getElementById('userUni').textContent = user.university;
            document.getElementById('navUserRole').textContent = (user.role || 'student').replace('_', ' ');
            window.userUni  = user.university;
            window.userRole = user.role;

            const avatar = user.profile_pic
                ? user.profile_pic
                : `https://ui-avatars.com/api/?name=${encodeURIComponent(firstName)}&background=EA580C&color=fff`;
            document.getElementById('navUserAvatar').src = avatar;

            // super_admin: inject "Admin Panel" link at bottom of sidebar nav
            if (user.role === 'super_admin') {
                const nav = document.querySelector('aside nav.flex-1');
                if (nav) {
                    const a = document.createElement('a');
                    a.href = 'admin.html';
                    a.className = 'w-full flex items-center gap-3 px-3 py-2.5 text-orange-600 bg-orange-50 rounded-xl text-sm font-semibold mt-2 hover:bg-orange-100 transition';
                    a.innerHTML = '<i class="ri-admin-line text-base w-5 text-center"></i> Switch to Admin';
                    nav.appendChild(a);
                }
            }

            UI.showView('home');
            loadDashboardStats();
        });
    </script>
</body>
</html>
