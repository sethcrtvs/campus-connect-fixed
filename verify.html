<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Account | Campus Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .otp-input:focus { border-color: #EA580C; box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.1); }
        .bg-orange-gradient { background: linear-gradient(135deg, #EA580C 0%, #C2410C 100%); }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl shadow-orange-100 p-10 text-center border border-gray-50 animate-in fade-in zoom-in duration-500">
        <div class="w-20 h-20 bg-orange-50 rounded-3xl flex items-center justify-center mx-auto mb-8">
            <i class="ri-mail-check-line text-4xl text-orange-600"></i>
        </div>

        <h1 class="text-3xl font-black text-gray-900 tracking-tighter uppercase mb-2">Check Your Inbox</h1>
        <p class="text-gray-400 text-sm font-medium mb-10 leading-relaxed">
            We sent a 6-digit verification code to <br>
            <span id="displayEmail" class="text-orange-600 font-bold">your student email</span>
        </p>

        <div id="otp-container" class="flex justify-between gap-2 mb-10">
            <input type="text" maxlength="1" class="otp-input w-12 h-16 text-center text-2xl font-black bg-gray-50 border-2 border-transparent rounded-2xl outline-none transition-all focus:bg-white" autofocus>
            <input type="text" maxlength="1" class="otp-input w-12 h-16 text-center text-2xl font-black bg-gray-50 border-2 border-transparent rounded-2xl outline-none transition-all focus:bg-white">
            <input type="text" maxlength="1" class="otp-input w-12 h-16 text-center text-2xl font-black bg-gray-50 border-2 border-transparent rounded-2xl outline-none transition-all focus:bg-white">
            <input type="text" maxlength="1" class="otp-input w-12 h-16 text-center text-2xl font-black bg-gray-50 border-2 border-transparent rounded-2xl outline-none transition-all focus:bg-white">
            <input type="text" maxlength="1" class="otp-input w-12 h-16 text-center text-2xl font-black bg-gray-50 border-2 border-transparent rounded-2xl outline-none transition-all focus:bg-white">
            <input type="text" maxlength="1" class="otp-input w-12 h-16 text-center text-2xl font-black bg-gray-50 border-2 border-transparent rounded-2xl outline-none transition-all focus:bg-white">
        </div>

        <button id="verifyBtn" class="w-full py-5 bg-orange-gradient text-white rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl shadow-orange-200 hover:scale-[1.02] active:scale-95 transition-all">
            Verify Account
        </button>

        <p class="mt-8 text-[11px] font-bold text-gray-400 uppercase tracking-widest">
            Didn't get a code? <a href="#" id="resendOtp" class="text-orange-600 hover:underline">Resend OTP</a>
        </p>
    </div>

    <script src="assets/js/verify.js"></script>
</body>
</html>
