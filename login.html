<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Connect | Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .bg-orange-gradient { background: linear-gradient(135deg, #EA580C 0%, #C2410C 100%); }
        input:focus { border-color: #EA580C !important; background-color: white !important; outline: none; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">

    <!-- Notification toast -->
    <div id="notifToast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[400] flex flex-col gap-2 w-full max-w-sm px-4 pointer-events-none"></div>

    <div class="bg-white p-10 rounded-3xl shadow-xl shadow-orange-100/50 border border-gray-100 w-full max-w-md">
        <div class="w-12 h-12 bg-orange-50 rounded-2xl flex items-center justify-center mx-auto mb-5">
            <i class="ri-login-box-line text-2xl text-orange-600"></i>
        </div>
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-1">Welcome back</h2>
            <p class="text-gray-400 text-sm">Sign in to your account</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="text-xs font-semibold text-gray-500 ml-1 mb-1 block">University Email</label>
                <div class="relative">
                    <i class="ri-mail-line absolute left-4 top-3.5 text-gray-400 text-sm"></i>
                    <input type="email" id="email" placeholder="you@university.ac.ke" required
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border-2 border-transparent rounded-xl font-medium text-sm text-gray-700 transition">
                </div>
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 ml-1 mb-1 block">Password</label>
                <div class="relative">
                    <i class="ri-lock-line absolute left-4 top-3.5 text-gray-400 text-sm"></i>
                    <input type="password" id="password" placeholder="Your password" required
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border-2 border-transparent rounded-xl font-medium text-sm text-gray-700 transition">
                </div>
            </div>
            <button type="submit" id="loginBtn"
                class="w-full bg-orange-gradient text-white py-4 rounded-xl font-bold text-sm uppercase tracking-widest shadow-lg shadow-orange-200 hover:opacity-95 active:scale-95 transition-all mt-2">
                Sign In
            </button>
        </form>

        <p class="mt-6 text-center text-xs text-gray-400">
            New student? <a href="index.html" class="text-orange-600 font-semibold hover:underline">Create account</a>
        </p>
    </div>

    <script src="assets/js/auth.js"></script>
    <script>
        function showNotification(message, type = "info") {
            const container = document.getElementById("notifToast");
            if (!container) { alert(message); return; }
            const colors = { success:"bg-green-600", error:"bg-red-600", info:"bg-gray-900", warning:"bg-amber-500" };
            const icons  = { success:"ri-checkbox-circle-line", error:"ri-error-warning-line", info:"ri-information-line", warning:"ri-alert-line" };
            const el = document.createElement("div");
            el.className = `pointer-events-auto flex items-center gap-3 ${colors[type]||colors.info} text-white px-5 py-3 rounded-xl shadow-2xl text-sm font-semibold`;
            el.innerHTML = `<i class="${icons[type]||icons.info} text-base shrink-0"></i><span>${message}</span>`;
            container.appendChild(el);
            setTimeout(() => { el.style.opacity="0"; el.style.transition="opacity 0.3s"; setTimeout(()=>el.remove(),300); }, 3500);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const loginBtn = document.getElementById('loginBtn');
            const email    = document.getElementById('email').value.toLowerCase().trim();
            const password = document.getElementById('password').value;

            loginBtn.textContent = "Signing in...";
            loginBtn.disabled = true;

            try {
                const res    = await fetch('api/auth/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const result = await res.json();

                if (!result.success && result.needs_verification) {
                    localStorage.setItem('pending_verification_email', result.email);
                    showNotification("Please verify your email before logging in.", "warning");
                    setTimeout(() => { window.location.href = 'verify.html'; }, 1500);
                    return;
                }

                if (result.success) {
                    showNotification("Welcome back!", "success");
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
                } else {
                    showNotification(result.message || "Invalid email or password.", "error");
                    loginBtn.textContent = "Sign In";
                    loginBtn.disabled = false;
                }
            } catch (error) {
                showNotification("Connection error. Check XAMPP is running.", "error");
                loginBtn.textContent = "Sign In";
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
