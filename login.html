<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Connect | Student Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .bg-orange-gradient { background: linear-gradient(135deg, #EA580C 0%, #C2410C 100%); }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">

    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl shadow-orange-100 border border-gray-100 w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-4xl font-black text-gray-900 tracking-tighter uppercase">Welcome Back</h2>
            <p class="text-gray-400 text-sm font-medium mt-2">Log in to your vault</p>
        </div>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-2 mb-1 block">Student Email</label>
                <input type="email" id="email" placeholder="name@kcau.ac.ke" required 
                    class="w-full p-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:outline-none focus:border-orange-500 focus:bg-white transition-all">
            </div>

            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-2 mb-1 block">Password</label>
                <input type="password" id="password" placeholder="••••••••" required 
                    class="w-full p-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:outline-none focus:border-orange-500 focus:bg-white transition-all">
            </div>

            <button type="submit" id="loginBtn" class="w-full bg-orange-gradient text-white p-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl shadow-orange-200 hover:scale-[1.02] active:scale-95 transition-all mt-4">
                Enter the Vault
            </button>
        </form>

        <p id="msg" class="mt-6 text-xs text-center font-bold uppercase tracking-tight"></p>

        <p class="mt-8 text-center text-xs font-bold text-gray-400 uppercase tracking-widest">
            New Student? <a href="index.html" class="text-orange-600 hover:underline">Register here</a>
        </p>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('msg');
        const loginBtn = document.getElementById('loginBtn');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        loginBtn.innerText = "AUTHENTICATING...";
        loginBtn.disabled = true;

        try {
            const response = await fetch('api/auth/login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            
            const result = await response.json();

            // Scenario: User exists but is NOT verified
            if (!result.success && result.needs_verification) {
                localStorage.setItem('pending_verification_email', result.email);
                window.location.href = 'verify.html';
                return;
            }
            
            if (result.success) {
                msg.innerText = result.message;
                msg.className = "mt-6 text-xs text-center text-green-600 font-bold uppercase";
                window.location.href = 'dashboard.html'; 
            } else {
                msg.innerText = result.message;
                msg.className = "mt-6 text-xs text-center text-red-600 font-bold uppercase";
                loginBtn.innerText = "ENTER THE VAULT";
                loginBtn.disabled = false;
            }
        } catch (error) {
            msg.innerText = "Connection error. Check XAMPP.";
            msg.className = "mt-6 text-xs text-center text-red-600 font-bold uppercase";
            loginBtn.innerText = "ENTER THE VAULT";
            loginBtn.disabled = false;
        }
    });
</script>
</body>
</html>
