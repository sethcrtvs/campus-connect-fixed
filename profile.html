<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Campus Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f9f9f9; }
        .bg-orange-gradient { background: linear-gradient(135deg, #EA580C 0%, #C2410C 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="px-8 py-5 flex justify-between items-center max-w-5xl mx-auto">
        <button onclick="window.location.href='dashboard.html'" class="flex items-center gap-2 text-gray-400 font-semibold text-xs uppercase tracking-widest hover:text-orange-600 transition group">
            <i class="ri-arrow-left-s-line text-lg group-hover:-translate-x-1 transition"></i> Dashboard
        </button>
        <h2 class="font-bold text-base tracking-tight text-gray-900">My Profile</h2>
    </nav>

    <main class="max-w-4xl mx-auto px-8 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-8">

            <!-- Avatar card -->
            <div class="md:col-span-4">
                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 text-center sticky top-8">
                    <div class="relative inline-block mb-5">
                        <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=EA580C&color=fff"
                             class="w-28 h-28 rounded-2xl object-cover border-4 border-white shadow-lg">
                        <button id="uploadTrigger" class="absolute -bottom-2 -right-2 bg-gray-900 text-white p-2.5 rounded-xl shadow-lg hover:bg-orange-600 transition">
                            <i class="ri-camera-3-fill text-sm"></i>
                        </button>
                    </div>
                    <h3 id="profileName" class="text-xl font-bold text-gray-900 tracking-tight">—</h3>
                    <p id="profileUni" class="text-xs text-orange-600 font-semibold mt-1"></p>
                    <div class="mt-8 space-y-2">
                        <button id="saveProfileBtn"
                            class="w-full py-3 bg-orange-gradient text-white rounded-xl font-bold text-sm hover:opacity-90 active:scale-95 transition">
                            Save Changes
                        </button>
                        <button onclick="Auth.logout()"
                            class="w-full py-2.5 text-gray-400 font-semibold text-xs hover:text-red-500 transition">
                            Sign Out
                        </button>
                    </div>
                </div>
            </div>

            <!-- Edit form -->
            <div class="md:col-span-8">
                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8">
                    <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">Profile Information</h4>

                    <form id="profileForm" class="space-y-6">

                        <!-- Programme -->
                        <div>
                            <label class="text-xs font-semibold text-gray-500 ml-1 mb-1.5 block">Programme</label>
                            <div class="relative">
                                <i class="ri-graduation-cap-line absolute left-4 top-3.5 text-gray-400 text-sm"></i>
                                <input type="text" id="programme" placeholder="e.g. BSc Computer Science"
                                       class="w-full pl-10 pr-4 py-3 bg-gray-50 border-2 border-transparent rounded-xl text-sm font-medium focus:border-orange-500 focus:bg-white transition outline-none">
                            </div>
                        </div>

                        <!-- Links -->
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-xs font-semibold text-gray-500 ml-1">Links</label>
                                <button type="button" id="addLinkBtn"
                                        class="text-xs text-orange-600 font-semibold flex items-center gap-1 hover:underline">
                                    <i class="ri-add-line"></i> Add link
                                </button>
                            </div>
                            <div id="linksContainer" class="space-y-2"></div>
                            <p class="text-[10px] text-gray-400 mt-1.5 ml-1">Add your LinkedIn, portfolio, GitHub, or any other links.</p>
                        </div>

                        <!-- Bio -->
                        <div>
                            <label class="text-xs font-semibold text-gray-500 ml-1 mb-1.5 block">Bio</label>
                            <textarea id="bio" placeholder="Tell your peers a bit about yourself..."
                                      class="w-full p-4 bg-gray-50 border-2 border-transparent rounded-2xl text-sm font-medium h-32 no-scrollbar focus:border-orange-500 focus:bg-white transition outline-none resize-none"></textarea>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/auth.js"></script>
    <script src="assets/js/profile.js"></script>
</body>
</html>
