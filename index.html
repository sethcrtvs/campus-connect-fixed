<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Connect | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="assets/js/auth.js"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .bg-orange-gradient { background: linear-gradient(135deg, #EA580C 0%, #C2410C 100%); }
        input:focus, select:focus { border-color: #EA580C !important; background-color: white !important; outline: none; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl shadow-orange-100/50 p-10 border border-gray-100">
        <div class="w-12 h-12 bg-orange-50 rounded-2xl flex items-center justify-center mx-auto mb-5">
            <i class="ri-user-add-line text-2xl text-orange-600"></i>
        </div>

        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900 mb-1">Create your account</h1>
            <p class="text-gray-400 text-sm">Join Campus Connect and start collaborating.</p>
        </div>

        <form id="registrationForm" class="space-y-4">
            <div>
                <label class="text-xs font-semibold text-gray-500 ml-1 mb-1 block">Full Name</label>
                <div class="relative">
                    <i class="ri-user-line absolute left-4 top-3.5 text-gray-400 text-sm"></i>
                    <input type="text" id="fullName" placeholder="Your full name" required
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border-2 border-transparent rounded-xl font-medium text-sm text-gray-700 transition">
                </div>
            </div>

            <div>
                <label class="text-xs font-semibold text-gray-500 ml-1 mb-1 block">University Email</label>
                <div class="relative">
                    <i class="ri-mail-line absolute left-4 top-3.5 text-gray-400 text-sm"></i>
                    <input type="email" id="email" placeholder="you@university.ac.ke" required
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border-2 border-transparent rounded-xl font-medium text-sm text-gray-700 transition">
                </div>
            </div>

            <div>
                <label class="text-xs font-semibold text-gray-500 ml-1 mb-1 block">University</label>
                <div class="relative">
                    <i class="ri-building-line absolute left-4 top-3.5 text-gray-400 text-sm"></i>
                    <select id="university" required
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border-2 border-transparent rounded-xl font-medium text-sm text-gray-700 appearance-none transition">
                        <option value="" disabled selected>Select your university</option>
                        <option value="KCA University">KCA University</option>
                        <option value="JKUAT">JKUAT</option>
                        <option value="University of Nairobi">University of Nairobi</option>
                        <option value="Kenyatta University">Kenyatta University</option>
                        <option value="Strathmore University">Strathmore University</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="text-xs font-semibold text-gray-500 ml-1 mb-1 block">Password</label>
                <div class="relative">
                    <i class="ri-lock-line absolute left-4 top-3.5 text-gray-400 text-sm"></i>
                    <input type="password" id="password" placeholder="Minimum 8 characters" required
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border-2 border-transparent rounded-xl font-medium text-sm text-gray-700 transition">
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-4 bg-orange-gradient text-white rounded-xl font-bold text-sm uppercase tracking-widest shadow-lg shadow-orange-200 hover:opacity-95 active:scale-95 transition-all mt-2">
                Create Account
            </button>
        </form>

        <p id="msg" class="mt-4 text-xs text-center font-semibold transition-all"></p>

        <p class="mt-6 text-center text-xs text-gray-400">
            Already a member? <a href="login.html" class="text-orange-600 font-semibold hover:underline">Sign in</a>
        </p>
    </div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const msg = document.getElementById('msg');

            const formData = {
                fullName: document.getElementById('fullName').value.trim(),
                email: document.getElementById('email').value.toLowerCase().trim(),
                university: document.getElementById('university').value,
                password: document.getElementById('password').value
            };

            submitBtn.textContent = "Creating account...";
            submitBtn.disabled = true;
            msg.textContent = "";

            await Auth.register(formData);

            submitBtn.textContent = "Create Account";
            submitBtn.disabled = false;
        });
    </script>
</body>
</html>
