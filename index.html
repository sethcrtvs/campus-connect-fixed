<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Connect | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="assets/js/auth.js"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .bg-orange-gradient { background: linear-gradient(135deg, #EA580C 0%, #C2410C 100%); }
        input:focus, select:focus { border-color: #EA580C !important; background-color: white !important; outline: none; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">

    <!-- Notification toast -->
    <div id="notifToast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[400] flex flex-col gap-2 w-full max-w-sm px-4 pointer-events-none"></div>

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl shadow-orange-100/50 p-10 border border-gray-100">
        <div class="w-12 h-12 bg-orange-50 rounded-2xl flex items-center justify-center mx-auto mb-5">
            <i class="ri-user-add-line text-2xl text-orange-600"></i>
        </div>
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900 mb-1">Create your account</h1>
            <p class="text-gray-400 text-sm">Join Campus Connect and start collaborating.</p>
        </div>

        <form id="registrationForm" class="space-y-4">
            <div>
                <label class="text-xs font-semibold text-gray-500 ml-1 mb-1 block">Full Name</label>
                <div class="relative">
                    <i class="ri-user-line absolute left-4 top-3.5 text-gray-400 text-sm"></i>
                    <input type="text" id="fullName" placeholder="Your full name" required
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border-2 border-transparent rounded-xl font-medium text-sm text-gray-700 transition">
                </div>
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 ml-1 mb-1 block">University Email</label>
                <div class="relative">
                    <i class="ri-mail-line absolute left-4 top-3.5 text-gray-400 text-sm"></i>
                    <input type="email" id="email" placeholder="you@university.ac.ke" required
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border-2 border-transparent rounded-xl font-medium text-sm text-gray-700 transition">
                </div>
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 ml-1 mb-1 block">University</label>
                <div class="relative">
                    <i class="ri-building-line absolute left-4 top-3.5 text-gray-400 text-sm"></i>
                    <select id="university" required
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border-2 border-transparent rounded-xl font-medium text-sm text-gray-700 appearance-none transition">
                        <option value="" disabled selected>Select your university</option>
                        <option value="KCA University">KCA University</option>
                        <option value="JKUAT">JKUAT</option>
                        <option value="University of Nairobi">University of Nairobi</option>
                        <option value="Kenyatta University">Kenyatta University</option>
                        <option value="Strathmore University">Strathmore University</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 ml-1 mb-1 block">Password</label>
                <div class="relative">
                    <i class="ri-lock-line absolute left-4 top-3.5 text-gray-400 text-sm"></i>
                    <input type="password" id="password" placeholder="Minimum 8 characters" required
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 border-2 border-transparent rounded-xl font-medium text-sm text-gray-700 transition">
                </div>
            </div>
            <button type="submit" id="submitBtn"
                class="w-full py-4 bg-orange-gradient text-white rounded-xl font-bold text-sm uppercase tracking-widest shadow-lg shadow-orange-200 hover:opacity-95 active:scale-95 transition-all mt-2">
                Create Account
            </button>
        </form>

        <p class="mt-6 text-center text-xs text-gray-400">
            Already a member? <a href="login.html" class="text-orange-600 font-semibold hover:underline">Sign in</a>
        </p>
    </div>

    <script>
        function showNotification(message, type = "info") {
            const container = document.getElementById("notifToast");
            if (!container) { alert(message); return; }
            const colors = { success:"bg-green-600", error:"bg-red-600", info:"bg-gray-900", warning:"bg-amber-500" };
            const icons  = { success:"ri-checkbox-circle-line", error:"ri-error-warning-line", info:"ri-information-line", warning:"ri-alert-line" };
            const el = document.createElement("div");
            el.className = `pointer-events-auto flex items-center gap-3 ${colors[type]||colors.info} text-white px-5 py-3 rounded-xl shadow-2xl text-sm font-semibold`;
            el.innerHTML = `<i class="${icons[type]||icons.info} text-base shrink-0"></i><span>${message}</span>`;
            container.appendChild(el);
            setTimeout(() => { el.style.opacity="0"; el.style.transition="opacity 0.3s"; setTimeout(()=>el.remove(),300); }, 3500);
        }

        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');

            // Client-side validation with notifications
            const email    = document.getElementById('email').value.toLowerCase().trim();
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value.trim();
            const university = document.getElementById('university').value;

            if (!fullName) { showNotification("Please enter your full name.", "error"); return; }
            if (!university) { showNotification("Please select your university.", "error"); return; }
            if (!email.endsWith('.ac.ke') && !email.endsWith('.edu')) {
                showNotification("Please use your university email address.", "error"); return;
            }
            if (password.length < 8) {
                showNotification("Password must be at least 8 characters.", "error"); return;
            }

            submitBtn.textContent = "Creating account...";
            submitBtn.disabled = true;

            try {
                const res    = await fetch('api/auth/register.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, university, password })
                });
                const result = await res.json();

                if (result.success) {
                    localStorage.setItem('pending_verification_email', result.email);
                    showNotification(result.message, "success");
                    setTimeout(() => { window.location.href = result.redirect; }, 1500);
                } else {
                    showNotification(result.message, "error");
                    submitBtn.textContent = "Create Account";
                    submitBtn.disabled = false;
                }
            } catch (err) {
                showNotification("Connection error. Please try again.", "error");
                submitBtn.textContent = "Create Account";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
