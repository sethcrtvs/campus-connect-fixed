<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Campus Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f9f9f9; }
        .nav-link { transition: all 0.2s ease; cursor: pointer; }
        .nav-link:hover { background: #fff7ed; color: #ea580c; }
        .nav-link.active { background: #fff7ed; color: #ea580c; font-weight: 600; border-right: 3px solid #ea580c; }
        .bg-orange-gradient { background: linear-gradient(135deg, #EA580C 0%, #C2410C 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-60 bg-white border-r border-gray-100 flex flex-col fixed h-full z-50">
        <div class="px-6 py-6">
            <h1 class="text-lg font-black text-gray-900 tracking-tight">Campus<span class="text-orange-600">Connect</span></h1>
            <p class="text-[9px] font-bold text-orange-600 uppercase tracking-widest mt-0.5">Admin Portal</p>
        </div>

        <nav class="flex-1 px-3 space-y-0.5">
            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest px-3 pt-1 pb-2">Management</p>
            <button onclick="AdminUI.show('overview')" id="btn-overview"
                class="w-full flex items-center gap-3 px-3 py-2.5 text-gray-500 rounded-xl nav-link text-sm active">
                <i class="ri-dashboard-line text-base w-5 text-center"></i> Overview
            </button>
            <button onclick="AdminUI.show('events')" id="btn-events"
                class="w-full flex items-center gap-3 px-3 py-2.5 text-gray-500 rounded-xl nav-link text-sm">
                <i class="ri-calendar-event-line text-base w-5 text-center"></i> Campus Events
            </button>
            <button onclick="AdminUI.show('resources')" id="btn-resources"
                class="w-full flex items-center gap-3 px-3 py-2.5 text-gray-500 rounded-xl nav-link text-sm">
                <i class="ri-book-read-line text-base w-5 text-center"></i> Verify Resources
            </button>
        </nav>

        <div class="p-4 border-t border-gray-100">
            <div id="adminUserInfo" class="mb-3 px-2">
                <p id="adminName" class="text-sm font-bold text-gray-900">Admin</p>
                <p id="adminUni" class="text-[10px] text-orange-600 font-semibold"></p>
            </div>
            <button onclick="Auth.logout()"
                class="w-full flex items-center gap-3 px-3 py-2.5 text-red-400 hover:bg-red-50 rounded-xl transition text-sm font-semibold">
                <i class="ri-logout-box-r-line text-base"></i> Sign Out
            </button>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 ml-60 min-h-screen p-8">
        <!-- Overview -->
        <div id="view-overview">
            <h2 class="text-3xl font-black text-gray-900 tracking-tight mb-2">Welcome, <span id="adminGreetName" class="text-orange-600">Admin</span></h2>
            <p id="adminUniLabel" class="text-sm text-gray-400 mb-8"></p>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
                    <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1">Pending Resources</p>
                    <p id="statPending" class="text-3xl font-black text-gray-900">–</p>
                </div>
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
                    <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1">Upcoming Events</p>
                    <p id="statEvents" class="text-3xl font-black text-gray-900">–</p>
                </div>
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
                    <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1">Total Students</p>
                    <p id="statStudents" class="text-3xl font-black text-gray-900">–</p>
                </div>
            </div>

            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
                <h3 class="text-sm font-bold text-gray-900 mb-4">Pending resource approvals</h3>
                <div id="pendingList" class="space-y-3 max-h-96 overflow-y-auto no-scrollbar"></div>
            </div>
        </div>

        <!-- Events -->
        <div id="view-events" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-gray-900 tracking-tight">Campus Events</h2>
                <button onclick="AdminUI.openCreateEvent()"
                    class="bg-orange-gradient text-white px-5 py-2.5 rounded-xl font-semibold text-sm hover:opacity-90 transition">
                    + New Event
                </button>
            </div>
            <div id="adminEventsList" class="space-y-3"></div>
        </div>

        <!-- Resources -->
        <div id="view-resources" class="hidden">
            <h2 class="text-2xl font-black text-gray-900 tracking-tight mb-6">Verify Resources</h2>
            <div class="mb-4 flex gap-2">
                <button onclick="AdminUI.loadResources('pending')" id="tab-pending"
                    class="px-4 py-2 rounded-lg text-xs font-bold bg-gray-900 text-white transition">Pending</button>
                <button onclick="AdminUI.loadResources('all')" id="tab-all"
                    class="px-4 py-2 rounded-lg text-xs font-bold bg-gray-100 text-gray-600 transition">All Resources</button>
            </div>
            <div id="adminResourcesList" class="space-y-3"></div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
        <div id="modalContent" class="bg-white w-full max-w-lg rounded-2xl shadow-2xl relative">
            <button onclick="AdminUI.closeModal()" class="absolute top-4 right-5 text-gray-300 hover:text-gray-700 text-3xl leading-none z-10">&times;</button>
            <div id="modalBody" class="max-h-[88vh] overflow-y-auto no-scrollbar"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 z-[200] hidden">
        <div class="bg-gray-900 text-white px-5 py-3 rounded-xl text-sm font-semibold shadow-xl"></div>
    </div>

    <script src="assets/js/auth.js"></script>
    <script src="assets/js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await Auth.checkSession();
            if (!user) { window.location.href = 'login.html'; return; }

            const allowed = ['uni_admin', 'super_admin'];
            if (!allowed.includes(user.role)) {
                window.location.href = 'dashboard.html';
                return;
            }

            document.getElementById('adminGreetName').textContent = user.full_name.split(' ')[0];
            document.getElementById('adminName').textContent = user.full_name;
            document.getElementById('adminUni').textContent = user.university;
            document.getElementById('adminUniLabel').textContent = user.university + ' · Admin Portal';
            window.adminUni = user.university;
            window.adminRole = user.role;

            AdminUI.init();
        });
    </script>
</body>
</html>
